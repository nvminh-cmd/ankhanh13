<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chuyển đổi Ghi âm sang Word</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>Ủy ban MTTQ Việt Nam Phường An Khánh - Tp.HCM</h2>
        <h3>Công cụ chuyển đổi Ghi âm thành Văn bản (Word)</h3>
        
        <input type="file" id="audioFile" accept="audio/*">
        <button onclick="uploadAndConvert()">Xử lý chuyển đổi</button>
        
        <div id="status"></div>
    </div>

    <script>
        async function uploadAndConvert() {
            const fileInput = document.getElementById('audioFile');
            const file = fileInput.files[0];
            if (!file) return alert("Vui lòng chọn file ghi âm!");

            const formData = new FormData();
            formData.append('audio', file);

            document.getElementById('status').innerText = "Đang xử lý, vui lòng chờ...";

            // Gửi file đến server Python/Node.js của bạn
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const blob = await response.blob();
            
            // Tải file về máy
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Van_ban_chuyen_doi.docx";
            a.click();
            document.getElementById('status').innerText = "Hoàn tất!";
        }
    </script>
</body>
</html>
