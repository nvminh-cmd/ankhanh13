<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chuyển đổi Giọng nói sang Word</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 300px; margin-top: 10px; padding: 10px; }
        .controls { margin-bottom: 20px; }
        button { padding: 10px 20px; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>

    <h1>Ủy ban MTTQ Việt Nam Phường An Khánh - TP.HCM</h1>
    <p>Nhấn "Bắt đầu ghi âm" để nói, sau đó nhấn "Tải về file Word".</p>

    <div class="controls">
        <button id="startBtn">🎤 Bắt đầu ghi âm</button>
        <button id="stopBtn" disabled>⏹️ Dừng ghi âm</button>
        <button id="saveBtn">💾 Tải về file Word</button>
    </div>

    <textarea id="output" placeholder="Văn bản sẽ hiển thị ở đây..."></textarea>

    <script>
        const output = document.getElementById('output');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const saveBtn = document.getElementById('saveBtn');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'vi-VN'; // Thiết lập tiếng Việt
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                transcript += event.results[i][0].transcript;
            }
            output.value = transcript;
        };

        startBtn.onclick = () => {
            recognition.start();
            startBtn.disabled = true;
            stopBtn.disabled = false;
        };

        stopBtn.onclick = () => {
            recognition.stop();
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };

        saveBtn.onclick = () => {
            const content = output.value;
            const header = "Ủy ban MTTQ Việt Nam Phường An Khánh - TP.HCM\n\n";
            const fullText = header + content;
            
            // Tạo blob để tải file
            const blob = new Blob([fullText], {type: 'application/msword'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Van_Ban_MTTQ.doc';
            a.click();
        };
    </script>
</body>
</html>
